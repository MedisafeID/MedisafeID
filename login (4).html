<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MediSafe-ID — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
html,body { height:100%; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased }
body {
  background:#0a0d14;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(26,77,255,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(26,77,255,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 90%, rgba(26,77,255,0.05) 0%, transparent 45%);
  pointer-events:none;
}
.auth-wrap {
  position:relative; z-index:10;
  width:100%; max-width:420px;
  padding:24px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
}
.auth-logo {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  text-align:center;
}
.auth-logo-icon {
  width:72px; height:72px; border-radius:18px;
  background:#000;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 12px 40px rgba(26,77,255,0.5), 0 0 0 1px rgba(26,77,255,0.2);
  overflow:hidden;
}
.auth-logo-icon img { width:100%; height:100%; object-fit:cover; display:block; }
.auth-logo-text { display:flex; flex-direction:column; gap:6px; }
.auth-logo-name { font-size:24px; font-weight:800; color:#fff; letter-spacing:-0.8px; line-height:1; }
.auth-logo-sub { font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:0.1px; line-height:1; font-weight:400; }
.auth-status {
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:5px 14px;
  font-size:11px; font-weight:500; color:rgba(255,255,255,0.4);
  letter-spacing:0.2px;
}
.auth-status-dot {
  width:6px; height:6px; border-radius:50%;
  background:#22c55e;
  animation:greenpulse 2.5s ease infinite;
  flex-shrink:0;
}
@keyframes greenpulse {
  0%,100% { box-shadow:0 0 0 0 rgba(34,197,94,0.5) }
  50%      { box-shadow:0 0 0 5px rgba(34,197,94,0) }
}
.auth-card {
  width:100%;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:18px;
  padding:28px;
  backdrop-filter:blur(12px);
}
.auth-tabs {
  display:flex;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;
  padding:3px;
  margin-bottom:24px;
  gap:3px;
}
.auth-tab {
  flex:1; padding:8px 12px;
  border-radius:8px;
  font-size:13px; font-weight:600;
  background:transparent;
  color:rgba(255,255,255,0.35);
  border:none; cursor:pointer;
  font-family:inherit;
  transition:all 0.15s;
  letter-spacing:-0.1px;
}
.auth-tab.active { background:#1a4dff; color:#fff; box-shadow:0 2px 10px rgba(26,77,255,0.4); }
.auth-tab:not(.active):hover { color:rgba(255,255,255,0.65); background:rgba(255,255,255,0.05); }
.auth-error {
  display:none;
  background:rgba(220,38,38,0.1);
  border:1px solid rgba(220,38,38,0.2);
  border-radius:8px;
  padding:10px 14px;
  font-size:12px; color:#fca5a5;
  margin-bottom:16px;
}
.auth-success {
  display:none;
  background:rgba(34,197,94,0.1);
  border:1px solid rgba(34,197,94,0.2);
  border-radius:8px;
  padding:10px 14px;
  font-size:12px; color:#86efac;
  margin-bottom:16px;
  line-height:1.5;
}
.auth-fields { display:flex; flex-direction:column; gap:14px }
.auth-field-wrap { display:flex; flex-direction:column; gap:6px }
.auth-label {
  font-size:10px; font-weight:700;
  color:rgba(255,255,255,0.3);
  letter-spacing:0.9px; text-transform:uppercase;
}
.auth-input {
  width:100%;
  padding:11px 14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  font-size:14px;
  font-family:inherit;
  color:#fff;
  outline:none;
  transition:all 0.15s;
}
.auth-input::placeholder { color:rgba(255,255,255,0.2) }
.auth-input:focus {
  border-color:rgba(26,77,255,0.7);
  background:rgba(26,77,255,0.06);
  box-shadow:0 0 0 3px rgba(26,77,255,0.15);
}
.auth-name-field { display:none }
.auth-forgot {
  text-align:right;
  font-size:11px;
  color:rgba(255,255,255,0.3);
  cursor:pointer;
  transition:color 0.15s;
  text-decoration:none;
  margin-top:-6px;
}
.auth-forgot:hover { color:rgba(26,77,255,0.9) }
.auth-btn {
  width:100%;
  background:#1a4dff;
  color:#fff;
  padding:13px;
  border-radius:10px;
  font-size:14px; font-weight:700;
  border:none; cursor:pointer;
  font-family:inherit;
  letter-spacing:-0.1px;
  box-shadow:0 4px 20px rgba(26,77,255,0.4);
  transition:all 0.15s;
  margin-top:4px;
}
.auth-btn:hover { background:#1240e0; box-shadow:0 6px 28px rgba(26,77,255,0.55); transform:translateY(-1px); }
.auth-btn:active { transform:translateY(0) }
.auth-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none }
.auth-divider { display:flex; align-items:center; gap:12px; margin-top:20px; }
.auth-divider-line { flex:1; height:1px; background:rgba(255,255,255,0.07); }
.auth-divider-text { font-size:11px; color:rgba(255,255,255,0.2); white-space:nowrap; }
.auth-terms { font-size:11px; color:rgba(255,255,255,0.25); line-height:1.6; text-align:center; margin-top:16px; }
.auth-terms a { color:rgba(255,255,255,0.4); text-decoration:underline; text-underline-offset:2px; }
.auth-trust { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
.trust-pill {
  display:inline-flex; align-items:center; gap:5px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;
  padding:5px 12px;
  font-size:11px; font-weight:500;
  color:rgba(255,255,255,0.3);
}
.trust-pill-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.25); flex-shrink:0; }
@media(max-width:480px) {
  .auth-card { padding:22px 18px }
  .auth-wrap { padding:20px 16px }
}
</style>
</head>

        <input class="auth-input" id="f-email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>

      <div class="auth-field-wrap" id="pass-field-wrap">
        <label class="auth-label">Password</label>
        <input class="auth-input" id="f-pass" type="password" placeholder="••••••••"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter')handleAuth()">
        <a class="auth-forgot" id="forgot-link" onclick="handleForgotPassword()">Forgot password?</a>

      <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Sign In</button>

    <div class="trust-pill"><div class="trust-pill-dot"></div>Instant scan alerts</div>
  </div>

</div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://etmrnmfianhuowhkrpwh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bXJubWZpYW5odW93aGtycHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI1OTcwNjMsImV4cCI6MjA1ODE3MzA2M30.Cs2MBKzFnCiSStPeBXpEqCkxj7LoWsHRMqHNO4RWSB4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── WHERE TO GO AFTER LOGIN ──────────────────────────────────────────────────
// Change to 'index.html' if you prefer the landing page
const REDIRECT_AFTER_LOGIN = 'purchase.html';

// ── CHECK IF ALREADY LOGGED IN ───────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    window.location.href = REDIRECT_AFTER_LOGIN;
  }
})();

// ── TAB STATE ────────────────────────────────────────────────────────────────
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  const isLogin = tab === 'login';
  document.getElementById('tab-login').className  = 'auth-tab' + (isLogin  ? ' active' : '');
  document.getElementById('tab-signup').className = 'auth-tab' + (!isLogin ? ' active' : '');
  document.getElementById('name-field').style.display   = isLogin ? 'none' : 'flex';
  document.getElementById('forgot-link').style.display  = isLogin ? 'block' : 'none';
  document.getElementById('auth-terms').style.display   = isLogin ? 'none' : 'block';
  document.getElementById('auth-btn').textContent       = isLogin ? 'Sign In' : 'Create Account';
  clearMessages();
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('auth-success').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.innerHTML = msg;
  el.style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}

function clearMessages() {
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

function setLoading(loading) {
  const btn = document.getElementById('auth-btn');
  btn.disabled = loading;
  btn.textContent = loading
    ? (currentTab === 'login' ? 'Signing in…' : 'Creating account…')
    : (currentTab === 'login' ? 'Sign In' : 'Create Account');
}

// ── AUTH HANDLER ─────────────────────────────────────────────────────────────
async function handleAuth() {
  const email = document.getElementById('f-email').value.trim();
  const pass  = document.getElementById('f-pass').value;

  if (!email) { showError('Please enter your email address.'); return; }
  if (!pass)  { showError('Please enter your password.'); return; }

  clearMessages();
  setLoading(true);

  if (currentTab === 'login') {
    // ── SIGN IN ──────────────────────────────────────────────────────────────
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

    if (error) {
      if (error.message.includes('Email not confirmed')) {
        showError('Please confirm your email first. Check your inbox for a verification link.');
      } else if (error.message.includes('Invalid login')) {
        showError('Incorrect email or password. Please try again.');
      } else {
        showError(error.message);
      }
      setLoading(false);
      return;
    }

    // Signed in — redirect
    window.location.href = REDIRECT_AFTER_LOGIN;

  } else {
    // ── SIGN UP ──────────────────────────────────────────────────────────────
    const name  = document.getElementById('f-name').value.trim();
    if (!name) { showError('Please enter your full name.'); setLoading(false); return; }

    const { data, error } = await sb.auth.signUp({
      email,
      password: pass,
      options: {
        data: { full_name: name },
        emailRedirectTo: window.location.origin + '/' + REDIRECT_AFTER_LOGIN,
      }
    });

    if (error) {
      if (error.message.includes('already registered')) {
        showError('An account with this email already exists. Try signing in instead.');
      } else {
        showError(error.message);
      }
      setLoading(false);
      return;
    }

    // Supabase sends a confirmation email — tell the user
    showSuccess(
      '✅ <strong>Account created!</strong> We sent a confirmation email to <strong>' + email + '</strong>. ' +
      'Click the link in that email to verify your account, then come back and sign in.'
    );
    // Switch to login tab so they can sign in after confirming
    setTimeout(() => switchTab('login'), 100);
    setLoading(false);
  }
}

// ── FORGOT PASSWORD ──────────────────────────────────────────────────────────
async function handleForgotPassword() {
  const email = document.getElementById('f-email').value.trim();
  if (!email) {
    showError('Enter your email address above, then click "Forgot password?".');
    return;
  }
  clearMessages();
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html',
  });
  if (error) {
    showError(error.message);
  } else {
    showSuccess('📧 Password reset email sent to <strong>' + email + '</strong>. Check your inbox.');
  }
}
</script>

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], animId;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function spawn() {
    particles = [];
    const count = Math.floor((W * H) / 14000);
    for (let i = 0; i < count; i++) {
      particles.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.4+0.4, vx:(Math.random()-0.5)*0.35, vy:(Math.random()-0.5)*0.35, alpha:Math.random()*0.45+0.1, pulse:Math.random()*Math.PI*2 });
    }
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    const g = ctx.createRadialGradient(W*0.25,H*0.5,0,W*0.25,H*0.5,W*0.65);
    g.addColorStop(0,'rgba(26,77,255,0.09)'); g.addColorStop(1,'rgba(26,77,255,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    for (let i=0;i<particles.length;i++) {
      for (let j=i+1;j<particles.length;j++) {
        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist<110) { ctx.beginPath(); ctx.strokeStyle=`rgba(26,77,255,${0.18*(1-dist/110)})`; ctx.lineWidth=0.6; ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); }
      }
    }
    particles.forEach(p => {
      p.pulse+=0.018; p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1;
      const a=p.alpha*(0.75+Math.sin(p.pulse)*0.25);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(100,145,255,${a})`; ctx.fill();
    });
    animId=requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();spawn();});
  resize(); spawn(); draw();
})();
</script>
